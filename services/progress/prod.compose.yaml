services:
  progress:
    build:
      context: ../../
      target: dev
      dockerfile: ./services/progress/Dockerfile
    env_file:
      - .env.prod
    depends_on:
      progress-db:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'grpc_health_probe -addr=progress:3000']
      timeout: 10s
      start_period: 15s
    ports:
      - 3002:3000

  progress-db:
    build:
      context: ./db
    env_file:
      - ./db/.env.prod
    volumes:
      - progress-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD', 'pg_isready']
      timeout: 30s
      retries: 5
      start_period: 20s

volumes:
  progress-db-data:
