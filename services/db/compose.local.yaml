services:
  db:
    build:
      context: ./
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=db
    volumes:
      - db-data:/var/lib/postgresql
    healthcheck:
      test: ['CMD', 'pg_isready']
      timeout: 30s
      retries: 5
      start_period: 20s
    ports:
      - 5432:5432
volumes:
  db-data: