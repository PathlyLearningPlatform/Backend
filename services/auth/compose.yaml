services:
  auth:
    build:
      context: .
      target: dev
    environment:
      - name=value
    healthcheck:
      test:
        - CMD-SHELL
        - > 
          bash -c '
            exec 3<>/dev/tcp/localhost/9000;
            printf "GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n" >&3;
            read -r data <&3;
            status=$${data:8:4};
            [ "$$status" -lt 400 ]
          '
      interval: 10s
      timeout: 15s
      retries: 3
      start_period: 40s
    ports:
      - 8080:8080
    depends_on:
      auth-db:
        condition: service_healthy
  auth-db:
    build:
      context: ./db
    environment:
      - name=value
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD', 'pg_isready']
      timeout: 30s
      retries: 5
      start_period: 20s
volumes:
  auth-db-data: