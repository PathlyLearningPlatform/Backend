services:
  skills:
    build:
      context: ../../
      target: dev
      dockerfile: ./services/skills/Dockerfile
    environment:
      - NAME=VALUE
    depends_on:
      skills-db:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'grpc_health_probe -addr=skills:3000']
      timeout: 10s
      start_period: 15s
    ports:
      - 3002:3000

  skills-db:
    image: neo4j:latest
    volumes:
      - skills-db-data:/data
    environment:
      - NEO4J_AUTH=neo4j/admin
    ports:
      - "7474:7474"
      - "7687:7687"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p admin 'RETURN 1;'"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  skills-db-data:
