include:
  - ../db/compose.local.yaml

services:
  learning-paths:
    build:
      context: ../../
      target: dev
      dockerfile: ./services/learning-paths/Dockerfile
    environment:
      - PORT=3000
      - JWT_AUDIENCE=api
      - JWT_ISSUER=http://localhost:8080/realms/pathly
      - JWT_PUBLIC_KEY_PATH=jwt-public-key.pem
      - DB_HOST=db
      - DB_NAME=db
      - DB_PORT=5432
      - DB_USER=admin
      - DB_PASSWORD=admin
    volumes:
      - ./src:/usr/src/app/services/learning-paths/src
      - ./test:/usr/src/app/services/learning-paths/test
      - type: bind
        source: ./tsconfig.json
        target: /usr/src/app/services/learning-paths/tsconfig.json
      - type: bind
        source: ./jest.config.ts
        target: /usr/src/app/services/learning-paths/jest.config.ts
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'node', 'healthcheck.js']
      timeout: 10s
      start_period: 15s
    ports:
      - 3001:3000
