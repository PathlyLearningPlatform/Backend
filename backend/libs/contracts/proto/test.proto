syntax = "proto3";

package test;

service TestService {
  rpc FindFoo(FindFooRequest) returns (FindFooResponse);
  rpc FindBar(FindBarRequest) returns (FindBarResponse);
}

message FindFooRequest {
  string field1 = 1;
  optional string field2 = 2;
}
message FindFooResponse {
  repeated FindFooRequest foos = 1;
}

message FindBarRequest {}
message FindBarResponse {}