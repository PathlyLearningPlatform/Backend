syntax = "proto3";

package paths.v1;

import "common/types.proto";

message Path {
  string id = 1;
  string createdAt = 2;
  string updatedAt = 3;
  string name = 4;
  string description = 5;
}

service PathsService {
  rpc Find(FindPathsRequest) returns (FindPathsResponse) {};
  rpc FindOne(FindOnePathRequest) returns (FindOnePathResponse) {};
  rpc Create(CreatePathRequest) returns (CreatePathResponse) {};
  rpc Update(UpdatePathRequest) returns (UpdatePathResponse) {};
  rpc Remove(RemovePathRequest) returns (RemovePathResponse) {};
}

enum PathsOrderByFields {
  NAME = 0;
  CREATED_AT = 1;
  UPDATED_AT = 2;
}
message FindPathsOptions {
  optional int32 limit = 1;
  optional int32 page = 2;
  optional common.SortType sortType = 3;
  optional PathsOrderByFields orderBy = 4;
}
message FindPathsRequest {
  optional FindPathsOptions options = 1;
}
message FindPathsResponse {
  repeated Path paths = 1;
}

message FindOnePathWhere {
  string id = 1;
}
message FindOnePathRequest {
  FindOnePathWhere where = 1;
}
message FindOnePathResponse {
  Path path = 1;
}

message CreatePathRequest {
  string name = 1;
  optional string description = 2;
}
message CreatePathResponse {
  Path path = 1;
}

message UpdatePathFields {
  optional string name = 1;
  optional string description = 2;
}
message UpdatePathWhere {
  string id = 1;
}
message UpdatePathRequest {
  UpdatePathWhere where = 1;
  optional UpdatePathFields fields = 2;
}
message UpdatePathResponse {
  Path path = 1;
}

message RemovePathWhere {
  string id = 1;
}
message RemovePathRequest {
  RemovePathWhere where = 1;
}
message RemovePathResponse {
  Path path = 1;
}