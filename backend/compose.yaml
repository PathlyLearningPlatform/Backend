include:
  - ./services/paths/compose.yaml

services:
  reverse-proxy:
    build:
      context: ./infrastructure/reverse-proxy
    env_file:
      - path: ./infrastructure/reverse-proxy/.env
        required: true
    volumes:
      - type: bind
        source: ./infrastructure/reverse-proxy/etc/nginx/nginx.conf
        target: /etc/nginx/nginx.conf
      - type: bind
        source: ./infrastructure/reverse-proxy/etc/nginx/proxy_params.conf
        target: /etc/nginx/proxy_params.conf
    depends_on:
      api-gateway:
        condition: service_healthy
    ports:
      - 4000:80
  api-gateway:
    build:
      context: .
      target: dev
      dockerfile: ./services/api-gateway/Dockerfile
    env_file:
      - path: ./services/api-gateway/.env
        required: true
    volumes:
      - ./services/api-gateway/src:/usr/src/app/services/api-gateway/src
      - ./services/api-gateway/test:/usr/src/app/services/api-gateway/test
      - ./services/api-gateway/@types:/usr/src/app/services/api-gateway/@types
      - ./libs/ts:/usr/src/app/libs/ts
    depends_on:
      paths:
        condition: service_healthy
    healthcheck:
      test: node ./healthcheck.js
      timeout: 10s
      start_period: 15s
