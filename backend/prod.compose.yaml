include:
  - ./services/paths/compose.yaml

services:
  reverse-proxy:
    build:
      context: ./infrastructure/reverse-proxy
    env_file:
      - path: ./infrastructure/reverse-proxy/.env
        required: true
    depends_on:
      api-gateway:
        condition: service_healthy
    ports:
      - 4000:80
  api-gateway:
    build:
      context: .
      target: dev
      dockerfile: ./services/api-gateway/Dockerfile
    env_file:
      - path: ./services/api-gateway/.env
        required: true
    depends_on:
      paths:
        condition: service_healthy
    healthcheck:
      test: node ./healthcheck.js
      timeout: 10s
      start_period: 15s
