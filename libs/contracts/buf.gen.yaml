version: v2
plugins:
  - local: ../../node_modules/ts-proto/protoc-gen-ts_proto
    out: ./gen/ts
    strategy: all
    opt:
      - nestJs=true
      - esModuleInterop=true
      - unrecognizedEnum=false
      - removeEnumPrefix=true
      - returnObservable=true
      - importSuffix=.js
      - stringEnums=true
