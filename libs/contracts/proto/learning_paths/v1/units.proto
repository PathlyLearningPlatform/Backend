syntax = "proto3";

package learning_paths.v1;

message Unit {
  string id = 1;
  string created_at = 2;
  string updated_at = 3;
  string name = 4;
  string description = 5;
  int32 order = 6;
  string section_id = 7;
  int32 lesson_count = 8;
}

message UnitProgress {
  string unit_id = 1;
  string user_id = 2;
  string completed_at = 3;
  int32 total_lesson_count = 4;
  int32 completed_lesson_count = 5;
  string section_id = 6;
}

service UnitsService {
  rpc List(UnitsServiceListRequest) returns (UnitsServiceListResponse) {}
  rpc FindById(UnitsServiceFindByIdRequest) returns (UnitsServiceFindByIdResponse) {}
  rpc Create(UnitsServiceCreateRequest) returns (UnitsServiceCreateResponse) {}
  rpc Update(UnitsServiceUpdateRequest) returns (UnitsServiceUpdateResponse) {}
  rpc Reorder(UnitsServiceReorderRequest) returns (UnitsServiceReorderResponse) {}
  rpc Remove(UnitsServiceRemoveRequest) returns (UnitsServiceRemoveResponse) {}

  rpc Start(UnitsServiceStartRequest) returns (UnitsServiceStartResponse) {}
  rpc RemoveProgress(UnitsServiceRemoveProgressRequest) returns (UnitsServiceRemoveProgressResponse) {}
  rpc FindOneProgressForUser(UnitsServiceFindOneProgressForUserRequest) returns (UnitsServiceFindOneProgressForUserResponse) {}
  rpc ListProgress(UnitsServiceListProgressRequest) returns (UnitsServiceListProgressResponse) {}
}

message UnitsServiceListRequest {
  message Options {
    optional int32 limit = 1;
    optional int32 page = 2;
  }

  message Where {
    optional string section_id = 1;
  }

  optional Options options = 1;
  optional Where where = 2;
}
message UnitsServiceListResponse {
  repeated Unit units = 1;
}

message UnitsServiceFindByIdRequest {
  message Where {
    string id = 1;
  }

  Where where = 1;
}
message UnitsServiceFindByIdResponse {
  Unit unit = 1;
}

message UnitsServiceCreateRequest {
  string name = 1;
  optional string description = 2;
  string section_id = 3;
}
message UnitsServiceCreateResponse {
  Unit unit = 1;
}

message UnitsServiceUpdateRequest {
  message Fields {
    optional string name = 1;
    optional string description = 2;
  }
  message Where {
    string id = 1;
  }

  Where where = 1;
  optional Fields fields = 2;
}
message UnitsServiceUpdateResponse {
  Unit unit = 1;
}

message UnitsServiceReorderRequest {
  string unit_id = 1;
  int32 order = 2;
}
message UnitsServiceReorderResponse {}

message UnitsServiceRemoveRequest {
  message Where {
    string id = 1;
  }

  Where where = 1;
}
message UnitsServiceRemoveResponse {}

message UnitsServiceStartRequest {
  string unit_id = 1;
  string user_id = 2;
}
message UnitsServiceStartResponse {
  UnitProgress progress = 1;
}

message UnitsServiceRemoveProgressRequest {
  string unit_id = 1;
  string user_id = 2;
}
message UnitsServiceRemoveProgressResponse {}

message UnitsServiceFindOneProgressForUserRequest {
  string unit_id = 1;
  string user_id = 2;
}
message UnitsServiceFindOneProgressForUserResponse {
  UnitProgress progress = 1;
}

message UnitsServiceListProgressRequest {
  message Options {
    optional int32 limit = 1;
    optional int32 page = 2;
  }
  message Where {
    optional string user_id = 1;
    optional string section_id = 2;
  }

  optional Options options = 1;
  optional Where where = 2;
}
message UnitsServiceListProgressResponse {
  repeated UnitProgress progress = 1;
}
