syntax = "proto3";

package learning_paths.v1;

message Lesson {
  string id = 1;
  string created_at = 2;
  string updated_at = 3;
  string name = 4;
  string description = 5;
  int32 order = 6;
  string unit_id = 7;
  int32 activity_count = 8;
}

message LessonProgress {
  string lesson_id = 1;
  string user_id = 2;
  string completed_at = 3;
  int32 total_activity_count = 4;
  int32 completed_activity_count = 5;
  string unit_id = 6;
}

service LessonsService {
  rpc List(LessonsServiceListRequest) returns (LessonsServiceListResponse) {}
  rpc FindById(LessonsServiceFindByIdRequest) returns (LessonsServiceFindByIdResponse) {}
  rpc Create(LessonsServiceCreateRequest) returns (LessonsServiceCreateResponse) {}
  rpc Update(LessonsServiceUpdateRequest) returns (LessonsServiceUpdateResponse) {}
  rpc Reorder(LessonsServiceReorderRequest) returns (LessonsServiceReorderResponse) {}
  rpc Remove(LessonsServiceRemoveRequest) returns (LessonsServiceRemoveResponse) {}

  rpc Start(LessonsServiceStartRequest) returns (LessonsServiceStartResponse) {}
  rpc RemoveProgress(LessonsServiceRemoveProgressRequest) returns (LessonsServiceRemoveProgressResponse) {}
  rpc FindOneProgressForUser(LessonsServiceFindOneProgressForUserRequest) returns (LessonsServiceFindOneProgressForUserResponse) {}
  rpc ListProgress(LessonsServiceListProgressRequest) returns (LessonsServiceListProgressResponse) {}
}

message LessonsServiceListRequest {
  message Options {
    optional int32 limit = 1;
    optional int32 page = 2;
  }

  message Where {
    optional string unit_id = 1;
  }

  optional Options options = 1;
  optional Where where = 2;
}
message LessonsServiceListResponse {
  repeated Lesson lessons = 1;
}

message LessonsServiceFindByIdRequest {
  message Where {
    string id = 1;
  }

  Where where = 1;
}
message LessonsServiceFindByIdResponse {
  Lesson lesson = 1;
}

message LessonsServiceCreateRequest {
  string name = 1;
  optional string description = 2;
  string unit_id = 3;
}
message LessonsServiceCreateResponse {
  Lesson lesson = 1;
}

message LessonsServiceUpdateRequest {
  message Fields {
    optional string name = 1;
    optional string description = 2;
  }

  message Where {
    string id = 1;
  }

  Where where = 1;
  optional Fields fields = 2;
}
message LessonsServiceUpdateResponse {
  Lesson lesson = 1;
}

message LessonsServiceReorderRequest {
  string lesson_id = 1;
  int32 order = 2;
}
message LessonsServiceReorderResponse {}

message LessonsServiceRemoveRequest {
  message Where {
    string id = 1;
  }

  Where where = 1;
}
message LessonsServiceRemoveResponse {}

message LessonsServiceStartRequest {
  string lesson_id = 1;
  string user_id = 2;
}
message LessonsServiceStartResponse {
  LessonProgress progress = 1;
}

message LessonsServiceRemoveProgressRequest {
  string lesson_id = 1;
  string user_id = 2;
}
message LessonsServiceRemoveProgressResponse {}

message LessonsServiceFindOneProgressForUserRequest {
  string lesson_id = 1;
  string user_id = 2;
}
message LessonsServiceFindOneProgressForUserResponse {
  LessonProgress progress = 1;
}

message LessonsServiceListProgressRequest {
  message Options {
    optional int32 limit = 1;
    optional int32 page = 2;
  }

  message Where {
    optional string user_id = 1;
    optional string unit_id = 2;
  }

  optional Options options = 1;
  optional Where where = 2;
}
message LessonsServiceListProgressResponse {
  repeated LessonProgress progress = 1;
}
