syntax = "proto3";

package learning_paths.v1;

enum ActivityType {
  ACTIVITY_TYPE_EXERCISE = 0;
  ACTIVITY_TYPE_ARTICLE = 1;
  ACTIVITY_TYPE_QUIZ = 2;
}

enum ExerciseDifficulty {
  EXERCISE_DIFFICULTY_EASY = 0;
  EXERCISE_DIFFICULTY_MEDIUM = 1;
  EXERCISE_DIFFICULTY_HARD = 2;
}

message Activity {
  string id = 1;
  string created_at = 2;
  string updated_at = 3;
  string name = 4;
  string description = 5;
  int32 order = 6;
  string lesson_id = 7;
  ActivityType type = 8;
}

message Article {
  string id = 1;
  string created_at = 2;
  string updated_at = 3;
  string name = 4;
  string description = 5;
  int32 order = 6;
  string lesson_id = 7;
  ActivityType type = 8;
  string ref = 9;
}

message Exercise {
  string id = 1;
  string created_at = 2;
  string updated_at = 3;
  string name = 4;
  string description = 5;
  int32 order = 6;
  string lesson_id = 7;
  ActivityType type = 8;
  ExerciseDifficulty difficulty = 9;
}

message Question {
  string id = 1;
  string quiz_id = 2;
  string content = 3;
  string correct_answer = 4;
  int32 order = 5;
}

message Quiz {
  string id = 1;
  string created_at = 2;
  string updated_at = 3;
  string name = 4;
  string description = 5;
  int32 order = 6;
  string lesson_id = 7;
  ActivityType type = 8;
  repeated Question questions = 9;
}

message ActivityProgress {
  string activity_id = 1;
  string user_id = 2;
  string completed_at = 3;
  string lesson_id = 4;
}

service ActivitiesService {
  rpc List(ActivitiesServiceListRequest) returns (ActivitiesServiceListResponse) {}
  rpc ListArticles(ActivitiesServiceListRequest) returns (ActivitiesServiceListArticlesResponse) {}
  rpc ListExercises(ActivitiesServiceListRequest) returns (ActivitiesServiceListExercisesResponse) {}
  rpc ListQuizzes(ActivitiesServiceListRequest) returns (ActivitiesServiceListQuizzesResponse) {}

  rpc FindById(ActivitiesServiceFindByIdRequest) returns (ActivitiesServiceFindByIdResponse) {}
  rpc FindArticleById(ActivitiesServiceFindByIdRequest) returns (ActivitiesServiceFindArticleByIdResponse) {}
  rpc FindExerciseById(ActivitiesServiceFindByIdRequest) returns (ActivitiesServiceFindExerciseByIdResponse) {}
  rpc FindQuizById(ActivitiesServiceFindByIdRequest) returns (ActivitiesServiceFindQuizByIdResponse) {}

  rpc CreateArticle(ActivitiesServiceCreateArticleRequest) returns (ActivitiesServiceCreateArticleResponse) {}
  rpc CreateExercise(ActivitiesServiceCreateExerciseRequest) returns (ActivitiesServiceCreateExerciseResponse) {}
  rpc CreateQuiz(ActivitiesServiceCreateQuizRequest) returns (ActivitiesServiceCreateQuizResponse) {}

  rpc UpdateArticle(ActivitiesServiceUpdateArticleRequest) returns (ActivitiesServiceUpdateArticleResponse) {}
  rpc UpdateExercise(ActivitiesServiceUpdateExerciseRequest) returns (ActivitiesServiceUpdateExerciseResponse) {}
  rpc UpdateQuiz(ActivitiesServiceUpdateQuizRequest) returns (ActivitiesServiceUpdateQuizResponse) {}

  rpc Reorder(ActivitiesServiceReorderRequest) returns (ActivitiesServiceReorderResponse) {}
  rpc Remove(ActivitiesServiceRemoveRequest) returns (ActivitiesServiceRemoveResponse) {}

  rpc FindQuestionById(ActivitiesServiceFindQuestionByIdRequest) returns (ActivitiesServiceFindQuestionByIdResponse) {}
  rpc CreateQuestion(ActivitiesServiceCreateQuestionRequest) returns (ActivitiesServiceCreateQuestionResponse) {}
  rpc UpdateQuestion(ActivitiesServiceUpdateQuestionRequest) returns (ActivitiesServiceUpdateQuestionResponse) {}
  rpc ReorderQuestion(ActivitiesServiceReorderQuestionRequest) returns (ActivitiesServiceReorderQuestionResponse) {}
  rpc RemoveQuestion(ActivitiesServiceRemoveQuestionRequest) returns (ActivitiesServiceRemoveQuestionResponse) {}

  rpc Complete(ActivitiesServiceCompleteRequest) returns (ActivitiesServiceCompleteResponse) {}
  rpc RemoveProgress(ActivitiesServiceRemoveProgressRequest) returns (ActivitiesServiceRemoveProgressResponse) {}
  rpc FindOneProgressForUser(ActivitiesServiceFindOneProgressForUserRequest) returns (ActivitiesServiceFindOneProgressForUserResponse) {}
  rpc ListProgress(ActivitiesServiceListProgressRequest) returns (ActivitiesServiceListProgressResponse) {}
}

message ActivitiesServiceFindQuestionByIdRequest {
  message Where {
    string id = 1;
    string quiz_id = 2;
  }

  Where where = 1;
}
message ActivitiesServiceFindQuestionByIdResponse {
  Question question = 1;
}

message ActivitiesServiceCreateQuestionRequest {
  string quiz_id = 1;
  string content = 2;
  string correct_answer = 3;
}
message ActivitiesServiceCreateQuestionResponse {
  Question question = 1;
}

message ActivitiesServiceUpdateQuestionRequest {
  message Where {
    string id = 1;
    string quiz_id = 2;
  }

  message Fields {
    optional string content = 1;
    optional string correct_answer = 2;
  }

  Where where = 1;
  optional Fields fields = 2;
}
message ActivitiesServiceUpdateQuestionResponse {
  Question question = 1;
}

message ActivitiesServiceReorderQuestionRequest {
  string question_id = 1;
  int32 order = 2;
  string quiz_id = 3;
}
message ActivitiesServiceReorderQuestionResponse {}

message ActivitiesServiceRemoveQuestionRequest {
  message Where {
    string id = 1;
    string quiz_id = 2;
  }

  Where where = 1;
}
message ActivitiesServiceRemoveQuestionResponse {}

message ActivitiesServiceListRequest {
  message Options {
    optional int32 limit = 1;
    optional int32 page = 2;
  }

  message Where {
    optional string lesson_id = 1;
  }

  optional Options options = 1;
  optional Where where = 2;
}
message ActivitiesServiceListResponse {
  repeated Activity activities = 1;
}

message ActivitiesServiceListArticlesResponse {
  repeated Article articles = 1;
}
message ActivitiesServiceListExercisesResponse {
  repeated Exercise exercises = 1;
}
message ActivitiesServiceListQuizzesResponse {
  repeated Quiz quizzes = 1;
}

message ActivitiesServiceFindByIdRequest {
  message Where {
    string id = 1;
  }

  Where where = 1;
}
message ActivitiesServiceFindByIdResponse {
  Activity activity = 1;
}

message ActivitiesServiceFindArticleByIdResponse {
  Article article = 1;
}
message ActivitiesServiceFindExerciseByIdResponse {
  Exercise exercise = 1;
}
message ActivitiesServiceFindQuizByIdResponse {
  Quiz quiz = 1;
}

message ActivitiesServiceCreateArticleRequest {
  string lesson_id = 1;
  string name = 2;
  optional string description = 4;
  string ref = 5;
}
message ActivitiesServiceCreateArticleResponse {
  Article article = 1;
}

message ActivitiesServiceCreateExerciseRequest {
  string lesson_id = 1;
  string name = 2;
  optional string description = 4;
  ExerciseDifficulty difficulty = 5;
}
message ActivitiesServiceCreateExerciseResponse {
  Exercise exercise = 1;
}

message ActivitiesServiceCreateQuizRequest {
  string lesson_id = 1;
  string name = 2;
  optional string description = 4;
}
message ActivitiesServiceCreateQuizResponse {
  Quiz quiz = 1;
}

message ActivitiesServiceUpdateArticleRequest {
  message Where {
    string activity_id = 1;
  }

  message Fields {
    optional string name = 1;
    optional string description = 2;
    optional string lesson_id = 4;
    optional string ref = 5;
  }

  Where where = 1;
  Fields fields = 2;
}
message ActivitiesServiceUpdateArticleResponse {
  Article article = 1;
}

message ActivitiesServiceUpdateExerciseRequest {
  message Where {
    string activity_id = 1;
  }

  message Fields {
    optional string name = 1;
    optional string description = 2;
    optional string lesson_id = 4;
    optional ExerciseDifficulty difficulty = 5;
  }

  Where where = 1;
  Fields fields = 2;
}
message ActivitiesServiceUpdateExerciseResponse {
  Exercise exercise = 1;
}

message ActivitiesServiceUpdateQuizRequest {
  message Where {
    string activity_id = 1;
  }

  message Fields {
    optional string name = 1;
    optional string description = 2;
    optional string lesson_id = 4;
  }

  Where where = 1;
  Fields fields = 2;
}
message ActivitiesServiceUpdateQuizResponse {
  Quiz quiz = 1;
}

message ActivitiesServiceReorderRequest {
  string activity_id = 1;
  int32 order = 2;
}
message ActivitiesServiceReorderResponse {}

message ActivitiesServiceRemoveRequest {
  message Where {
    string id = 1;
  }

  Where where = 1;
}
message ActivitiesServiceRemoveResponse {}

message ActivitiesServiceCompleteRequest {
  string activity_id = 1;
  string user_id = 2;
}
message ActivitiesServiceCompleteResponse {
  ActivityProgress progress = 1;
}

message ActivitiesServiceRemoveProgressRequest {
  string activity_id = 1;
  string user_id = 2;
}
message ActivitiesServiceRemoveProgressResponse {}

message ActivitiesServiceFindOneProgressForUserRequest {
  string activity_id = 1;
  string user_id = 2;
}
message ActivitiesServiceFindOneProgressForUserResponse {
  ActivityProgress progress = 1;
}

message ActivitiesServiceListProgressRequest {
  message Options {
    optional int32 limit = 1;
    optional int32 page = 2;
  }

  message Where {
    optional string user_id = 1;
    optional string lesson_id = 2;
  }

  optional Options options = 1;
  optional Where where = 2;
}
message ActivitiesServiceListProgressResponse {
  repeated ActivityProgress progress = 1;
}
