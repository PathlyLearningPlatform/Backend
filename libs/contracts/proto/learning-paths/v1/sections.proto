syntax = "proto3";

package learning_paths.v1;

import "common/types.proto";

message Section {
  string id = 1;
  string createdAt = 2;
  string updatedAt = 3;
  string name = 4;
  string description = 5;
  int32 order = 6;
  string learningPathId = 7;
  int32 unitCount = 8;
}

service SectionsService {
  rpc List(ListSectionsRequest) returns (ListSectionsResponse) {};
  rpc FindById(FindSectionByIdRequest) returns (FindSectionByIdResponse) {};
  rpc Create(CreateSectionRequest) returns (CreateSectionResponse) {};
  rpc Update(UpdateSectionRequest) returns (UpdateSectionResponse) {};
  rpc Reorder(ReorderSectionRequest) returns (ReorderSectionResponse) {};
  rpc Remove(RemoveSectionRequest) returns (RemoveSectionResponse) {};
}


message ListSectionsRequest {
  message Options {
    optional int32 limit = 1;
    optional int32 page = 2;
  }

  message Where {
    optional string learningPathId = 1;
  }

  optional Options options = 1;
  optional Where where = 2;
}
message ListSectionsResponse {
  repeated Section sections = 1;
}

message FindSectionByIdRequest {
  message Where {
    string id = 1;
  }

  Where where = 1;
}
message FindSectionByIdResponse {
  Section section = 1;
}

message CreateSectionRequest {
  string name = 1;
  optional string description = 2;
  string learningPathId = 3;
}
message CreateSectionResponse {
  Section section = 1;
}

message UpdateSectionRequest {
  message Fields {
    optional string name = 1;
    optional string description = 2;
  }

  message Where {
    string id = 1;
  }

  Where where = 1;
  optional Fields fields = 2;
}
message UpdateSectionResponse {
  Section section = 1;
}

message ReorderSectionRequest {
  string sectionId = 1;
  int32 order = 2;
}
message ReorderSectionResponse {}

message RemoveSectionRequest {
  message Where {
    string id = 1;
  }

  Where where = 1;
}
message RemoveSectionResponse {}