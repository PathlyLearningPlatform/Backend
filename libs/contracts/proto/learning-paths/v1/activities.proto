syntax = "proto3";

package learning_paths.v1;

import "common/types.proto";

service ActivitiesService {
  rpc Find (FindActivitiesRequest) returns (FindActivitiesResponse);

  rpc FindOne (FindOneActivityRequest) returns (FindOneActivityResponse);
  rpc FindOneArticle (FindOneActivityRequest) returns (FindOneArticleResponse);
  rpc FindOneExercise (FindOneActivityRequest) returns (FindOneExerciseResponse);
  rpc FindOneQuiz (FindOneActivityRequest) returns (FindOneQuizResponse);

  rpc CreateArticle (CreateArticleRequest) returns (CreateArticleResponse);
  rpc CreateExercise (CreateExerciseRequest) returns (CreateExerciseResponse);
  rpc CreateQuiz (CreateQuizRequest) returns (CreateQuizResponse);

  rpc UpdateArticle (UpdateArticleRequest) returns (UpdateArticleResponse);
  rpc UpdateExercise (UpdateExerciseRequest) returns (UpdateExerciseResponse);
  rpc UpdateQuiz (UpdateQuizRequest) returns (UpdateQuizResponse);

  rpc Remove (RemoveActivityRequest) returns (RemoveActivityResponse);

  rpc FindQuestions (FindQuestionsRequest) returns (FindQuestionsResponse);
  rpc FindOneQuestion (FindOneQuestionRequest) returns (FindOneQuestionResponse);
  rpc CreateQuestion (CreateQuestionRequest) returns (CreateQuestionResponse);
  rpc UpdateQuestion (UpdateQuestionRequest) returns (UpdateQuestionResponse);
  rpc RemoveQuestion (RemoveQuestionRequest) returns (RemoveQuestionResponse);
}

enum ActivityType {
  ACTIVITY_TYPE_EXERCISE = 0;
  ACTIVITY_TYPE_ARTICLE = 1;
  ACTIVITY_TYPE_QUIZ = 2;
}

enum ExerciseDifficulty {
  EXERCISE_DIFFICULTY_EASY = 0;
  EXERCISE_DIFFICULTY_MEDIUM = 1;
  EXERCISE_DIFFICULTY_HARD = 2;
}

// Entities

message Activity {
  string id = 1;
  string createdAt = 2;
  string updatedAt = 3;
  string name = 4;
  string description = 5;
  int32 order = 6;
  string lessonId = 7;
  ActivityType type = 8;
}

message Article {
  string id = 1;
  string createdAt = 2;
  string updatedAt = 3;
  string name = 4;
  string description = 5;
  int32 order = 6;
  string lessonId = 7;
  ActivityType type = 8;
  string ref = 9;
}

message Exercise {
  string id = 1;
  string createdAt = 2;
  string updatedAt = 3;
  string name = 4;
  string description = 5;
  int32 order = 6;
  string lessonId = 7;
  ActivityType type = 8;
  ExerciseDifficulty difficulty = 9;
}

message Quiz {
  string id = 1;
  string createdAt = 2;
  string updatedAt = 3;
  string name = 4;
  string description = 5;
  int32 order = 6;
  string lessonId = 7;
  ActivityType type = 8;
  int32 nextQuestionId = 9;
  repeated Question questions = 10;
}

message Question {
  int32 id = 1;
  string quizId = 2;
  string content = 3;
  string correctAnswer = 4;
}

// Request/Response

message FindQuestionsRequest {
  string quizId = 1;
}
message FindQuestionsResponse {
  repeated Question questions = 1;
}

message FindOneQuestionRequest {
  message Where {
    int32 id = 1;
    string quizId = 2;
  }

  Where where = 1;
}
message FindOneQuestionResponse {
  Question question = 1;
}

message CreateQuestionRequest {
  string quizId = 1;
  string content = 2;
  string correctAnswer = 3;
}
message CreateQuestionResponse {
  Question question = 1;
}

message UpdateQuestionRequest {
  message Where {
    int32 id = 1;
    string quizId = 2;
  }
  message Fields {
    optional string content = 1;
    optional string correctAnswer = 2;
  }

  Where where = 1;
  optional Fields fields = 2;
}
message UpdateQuestionResponse {
  Question question = 1;
}

message RemoveQuestionRequest {
  message Where {
    int32 id = 1;
    string quizId = 2;
  }

  Where where = 1;
}
message RemoveQuestionResponse {}

message FindActivitiesRequest {
  message Options {
    optional int32 limit = 1;
    optional int32 page = 2;
  }

  optional Options options = 1;
}

message FindActivitiesResponse {
  repeated Activity activities = 1;
}

message FindOneActivityRequest {
  message Where {
    string id = 1;
  }
  Where where = 1;
}

message FindOneActivityResponse {
  Activity activity = 1;
}

message FindOneArticleResponse {
  Article article = 1;
}

message FindOneExerciseResponse {
  Exercise exercise = 1;
}

message FindOneQuizResponse {
  Quiz quiz = 1;
}

message CreateArticleRequest {
  string lessonId = 1;
  string name = 2;
  int32 order = 3;
  optional string description = 4;
  string ref = 5;
}

message CreateArticleResponse {
  Article article = 1;
}

message CreateExerciseRequest {
  string lessonId = 1;
  string name = 2;
  int32 order = 3;
  optional string description = 4;
  ExerciseDifficulty difficulty = 5;
}

message CreateExerciseResponse {
  Exercise exercise = 1;
}

message CreateQuizRequest {
  string lessonId = 1;
  string name = 2;
  int32 order = 3;
  optional string description = 4;
}

message CreateQuizResponse {
  Quiz quiz = 1;
}

message UpdateArticleRequest {
  message Where {
    string activityId = 1;
  }
  message Fields {
    optional string name = 1;
    optional string description = 2;
    optional int32 order = 3;
    optional string lessonId = 4;
    optional string ref = 5;
  }
  Where where = 1;
  Fields fields = 2;
}

message UpdateArticleResponse {
  Article article = 1;
}

message UpdateExerciseRequest {
  message Where {
    string activityId = 1;
  }
  message Fields {
    optional string name = 1;
    optional string description = 2;
    optional int32 order = 3;
    optional string lessonId = 4;
    optional ExerciseDifficulty difficulty = 5;
  }
  Where where = 1;
  Fields fields = 2;
}

message UpdateExerciseResponse {
  Exercise exercise = 1;
}

message UpdateQuizRequest {
  message Where {
    string activityId = 1;
  }
  message Fields {
    optional string name = 1;
    optional string description = 2;
    optional int32 order = 3;
    optional string lessonId = 4;
  }
  Where where = 1;
  Fields fields = 2;
}

message UpdateQuizResponse {
  Quiz quiz = 1;
}

message RemoveActivityRequest {
  message Where {
    string id = 1;
  }
  Where where = 1;
}

message RemoveActivityResponse {}