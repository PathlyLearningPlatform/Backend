syntax = "proto3";

package learning_paths.v1;

import "common/types.proto";

service ActivitiesService {
  rpc List (ListActivitiesRequest) returns (ListActivitiesResponse) {};
  rpc ListArticles (ListActivitiesRequest) returns (ListArticlesResponse) {};
  rpc ListExercises (ListActivitiesRequest) returns (ListExercisesResponse) {};
  rpc ListQuizzes (ListActivitiesRequest) returns (ListQuizzesResponse) {};

  rpc FindById (FindActivityByIdRequest) returns (FindActivityByIdResponse) {};
  rpc FindArticleById (FindActivityByIdRequest) returns (FindArticleByIdResponse) {};
  rpc FindExerciseById (FindActivityByIdRequest) returns (FindExerciseByIdResponse) {};
  rpc FindQuizById (FindActivityByIdRequest) returns (FindQuizByIdResponse) {};

  rpc CreateArticle (CreateArticleRequest) returns (CreateArticleResponse) {};
  rpc CreateExercise (CreateExerciseRequest) returns (CreateExerciseResponse) {};
  rpc CreateQuiz (CreateQuizRequest) returns (CreateQuizResponse) {};

  rpc UpdateArticle (UpdateArticleRequest) returns (UpdateArticleResponse) {};
  rpc UpdateExercise (UpdateExerciseRequest) returns (UpdateExerciseResponse) {};
  rpc UpdateQuiz (UpdateQuizRequest) returns (UpdateQuizResponse) {};

  rpc Reorder(ReorderActivityRequest) returns (ReorderActivityResponse) {};
  rpc Remove (RemoveActivityRequest) returns (RemoveActivityResponse) {};

  rpc FindQuestionById (FindQuestionByIdRequest) returns (FindQuestionByIdResponse) {};
  rpc CreateQuestion (CreateQuestionRequest) returns (CreateQuestionResponse) {};
  rpc UpdateQuestion (UpdateQuestionRequest) returns (UpdateQuestionResponse) {};
  rpc ReorderQuestion (ReorderQuestionRequest) returns (ReorderQuestionResponse) {};
  rpc RemoveQuestion (RemoveQuestionRequest) returns (RemoveQuestionResponse) {};
}

enum ActivityType {
  ACTIVITY_TYPE_EXERCISE = 0;
  ACTIVITY_TYPE_ARTICLE = 1;
  ACTIVITY_TYPE_QUIZ = 2;
}

enum ExerciseDifficulty {
  EXERCISE_DIFFICULTY_EASY = 0;
  EXERCISE_DIFFICULTY_MEDIUM = 1;
  EXERCISE_DIFFICULTY_HARD = 2;
}

message Activity {
  string id = 1;
  string createdAt = 2;
  string updatedAt = 3;
  string name = 4;
  string description = 5;
  int32 order = 6;
  string lessonId = 7;
  ActivityType type = 8;
}

message Article {
  string id = 1;
  string createdAt = 2;
  string updatedAt = 3;
  string name = 4;
  string description = 5;
  int32 order = 6;
  string lessonId = 7;
  ActivityType type = 8;
  string ref = 9;
}

message Exercise {
  string id = 1;
  string createdAt = 2;
  string updatedAt = 3;
  string name = 4;
  string description = 5;
  int32 order = 6;
  string lessonId = 7;
  ActivityType type = 8;
  ExerciseDifficulty difficulty = 9;
}

message Question {
  string id = 1;
  string quizId = 2;
  string content = 3;
  string correctAnswer = 4;
  int32 order = 5;
}

message Quiz {
  string id = 1;
  string createdAt = 2;
  string updatedAt = 3;
  string name = 4;
  string description = 5;
  int32 order = 6;
  string lessonId = 7;
  ActivityType type = 8;
  repeated Question questions = 9;
}

message FindQuestionByIdRequest {
  message Where {
    string id = 1;
    string quizId = 2;
  }

  Where where = 1;
}
message FindQuestionByIdResponse {
  Question question = 1;
}

message CreateQuestionRequest {
  string quizId = 1;
  string content = 2;
  string correctAnswer = 3;
}
message CreateQuestionResponse {
  Question question = 1;
}

message UpdateQuestionRequest {
  message Where {
    string id = 1;
    string quizId = 2;
  }
  message Fields {
    optional string content = 1;
    optional string correctAnswer = 2;
  }

  Where where = 1;
  optional Fields fields = 2;
}
message UpdateQuestionResponse {
  Question question = 1;
}

message ReorderQuestionRequest {
  string questionId = 1;
  int32 order = 2;
  string quizId = 3;
}
message ReorderQuestionResponse {}

message RemoveQuestionRequest {
  message Where {
    string id = 1;
    string quizId = 2;
  }

  Where where = 1;
}
message RemoveQuestionResponse {}

message ListActivitiesRequest {
  message Options {
    optional int32 limit = 1;
    optional int32 page = 2;
  }

  message Where {
    optional string lessonId = 1;
  }

  optional Options options = 1;
  optional Where where = 2;
}
message ListActivitiesResponse {
  repeated Activity activities = 1;
}

message ListArticlesResponse {
  repeated Article articles = 1;
}
message ListExercisesResponse {
  repeated Exercise exercises = 1;
}
message ListQuizzesResponse {
  repeated Quiz quizzes = 1;
}

message FindActivityByIdRequest {
  message Where {
    string id = 1;
  }
  Where where = 1;
}
message FindActivityByIdResponse {
  Activity activity = 1;
}

message FindArticleByIdResponse {
  Article article = 1;
}
message FindExerciseByIdResponse {
  Exercise exercise = 1;
}
message FindQuizByIdResponse {
  Quiz quiz = 1;
}

message CreateArticleRequest {
  string lessonId = 1;
  string name = 2;
  optional string description = 4;
  string ref = 5;
}
message CreateArticleResponse {
  Article article = 1;
}

message CreateExerciseRequest {
  string lessonId = 1;
  string name = 2;
  optional string description = 4;
  ExerciseDifficulty difficulty = 5;
}
message CreateExerciseResponse {
  Exercise exercise = 1;
}

message CreateQuizRequest {
  string lessonId = 1;
  string name = 2;
  optional string description = 4;
}
message CreateQuizResponse {
  Quiz quiz = 1;
}

message UpdateArticleRequest {
  message Where {
    string activityId = 1;
  }

  message Fields {
    optional string name = 1;
    optional string description = 2;
    optional string lessonId = 4;
    optional string ref = 5;
  }

  Where where = 1;
  Fields fields = 2;
}
message UpdateArticleResponse {
  Article article = 1;
}

message UpdateExerciseRequest {
  message Where {
    string activityId = 1;
  }

  message Fields {
    optional string name = 1;
    optional string description = 2;
    optional string lessonId = 4;
    optional ExerciseDifficulty difficulty = 5;
  }

  Where where = 1;
  Fields fields = 2;
}
message UpdateExerciseResponse {
  Exercise exercise = 1;
}

message UpdateQuizRequest {
  message Where {
    string activityId = 1;
  }

  message Fields {
    optional string name = 1;
    optional string description = 2;
    optional string lessonId = 4;
  }

  Where where = 1;
  Fields fields = 2;
}
message UpdateQuizResponse {
  Quiz quiz = 1;
}

message ReorderActivityRequest {
  string activityId = 1;
  int32 order = 2;
}
message ReorderActivityResponse {}

message RemoveActivityRequest {
  message Where {
    string id = 1;
  }
  Where where = 1;
}
message RemoveActivityResponse {}