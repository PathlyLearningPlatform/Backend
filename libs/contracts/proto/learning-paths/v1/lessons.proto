syntax = "proto3";

package learning_paths.v1;

import "common/types.proto";

message Lesson {
  string id = 1;
  string createdAt = 2;
  string updatedAt = 3;
  string name = 4;
  string description = 5;
  int32 order = 6;
  string unitId = 7;
}

service LessonsService {
  rpc Find(FindLessonsRequest) returns (FindLessonsResponse) {};
  rpc FindOne(FindOneLessonRequest) returns (FindOneLessonResponse) {};
  rpc Create(CreateLessonRequest) returns (CreateLessonResponse) {};
  rpc Update(UpdateLessonRequest) returns (UpdateLessonResponse) {};
  rpc Remove(RemoveLessonRequest) returns (RemoveLessonResponse) {};
}

message FindLessonsOptions {
  optional int32 limit = 1;
  optional int32 page = 2;
}
message FindLessonsRequest {
  optional FindLessonsOptions options = 1;
}
message FindLessonsResponse {
  repeated Lesson lessons = 1;
}

message FindOneLessonWhere {
  string id = 1;
}
message FindOneLessonRequest {
  FindOneLessonWhere where = 1;
}
message FindOneLessonResponse {
  Lesson lesson = 1;
}

message CreateLessonRequest {
  string name = 1;
  optional string description = 2;
  int32 order = 3;
  string unitId = 4;
}
message CreateLessonResponse {
  Lesson lesson = 1;
}

message UpdateLessonFields {
  optional string name = 1;
  optional string description = 2;
  optional int32 order = 3;
}
message UpdateLessonWhere {
  string id = 1;
}
message UpdateLessonRequest {
  UpdateLessonWhere where = 1;
  optional UpdateLessonFields fields = 2;
}
message UpdateLessonResponse {
  Lesson lesson = 1;
}

message RemoveLessonWhere {
  string id = 1;
}
message RemoveLessonRequest {
  RemoveLessonWhere where = 1;
}
message RemoveLessonResponse {}