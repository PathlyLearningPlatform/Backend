syntax = "proto3";

package learning_paths.v1;

import "common/types.proto";

message Lesson {
  string id = 1;
  string createdAt = 2;
  string updatedAt = 3;
  string name = 4;
  string description = 5;
  int32 order = 6;
  string unitId = 7;
  int32 activityCount = 8;
}

service LessonsService {
  rpc List(ListLessonsRequest) returns (ListLessonsResponse) {};
  rpc FindById(FindLessonByIdRequest) returns (FindLessonByIdResponse) {};
  rpc Create(CreateLessonRequest) returns (CreateLessonResponse) {};
  rpc Update(UpdateLessonRequest) returns (UpdateLessonResponse) {};
  rpc Reorder(ReorderLessonRequest) returns (ReorderLessonResponse) {};
  rpc Remove(RemoveLessonRequest) returns (RemoveLessonResponse) {};
}


message ListLessonsRequest {
  message Options {
    optional int32 limit = 1;
    optional int32 page = 2;
  }
  message Where {
    optional string unitId = 1;
  }

  optional Options options = 1;
  optional Where where = 2;
}
message ListLessonsResponse {
  repeated Lesson lessons = 1;
}

message FindLessonByIdRequest {
  message Where {
    string id = 1;
  }

  Where where = 1;
}
message FindLessonByIdResponse {
  Lesson lesson = 1;
}

message CreateLessonRequest {
  string name = 1;
  optional string description = 2;
  string unitId = 3;
}
message CreateLessonResponse {
  Lesson lesson = 1;
}

message UpdateLessonRequest {
  message Fields {
    optional string name = 1;
    optional string description = 2;
  }
  message Where {
    string id = 1;
  }

  Where where = 1;
  optional Fields fields = 2;
}
message UpdateLessonResponse {
  Lesson lesson = 1;
}

message ReorderLessonRequest {
  string lessonId = 1;
  int32 order = 2;
}
message ReorderLessonResponse {}

message RemoveLessonRequest {
  message Where {
    string id = 1;
  }

  Where where = 1;
}
message RemoveLessonResponse {}