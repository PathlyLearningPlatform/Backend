syntax = "proto3";

package learning_paths.v1;

import "common/types.proto";

message LearningPath {
  string id = 1;
  string createdAt = 2;
  string updatedAt = 3;
  string name = 4;
  string description = 5;
  int32 sectionCount = 6;
}

service LearningPathsService {
  rpc List(ListLearningPathsRequest) returns (ListLearningPathsResponse) {};
  rpc FindById(FindLearningPathByIdRequest) returns (FindLearningPathByIdResponse) {};
  rpc Create(CreateLearningPathRequest) returns (CreateLearningPathResponse) {};
  rpc Update(UpdateLearningPathRequest) returns (UpdateLearningPathResponse) {};
  rpc Remove(RemoveLearningPathRequest) returns (RemoveLearningPathResponse) {};
}


message ListLearningPathsRequest {
  enum OrderByFields {
    NAME = 0;
    CREATED_AT = 1;
    UPDATED_AT = 2;
  }

  message Options {
    optional int32 limit = 1;
    optional int32 page = 2;
    optional common.SortType sortType = 3;
    optional OrderByFields orderBy = 4;
  }

  optional Options options = 1;
}
message ListLearningPathsResponse {
  repeated LearningPath learningPaths = 1;
}

message FindLearningPathByIdRequest {
  message Where {
    string id = 1;
  }

  Where where = 1;
}
message FindLearningPathByIdResponse {
  LearningPath learningPath = 1;
}

message CreateLearningPathRequest {
  string name = 1;
  optional string description = 2;
}
message CreateLearningPathResponse {
  LearningPath learningPath = 1;
}


message UpdateLearningPathRequest {
  message Fields {
    optional string name = 1;
    optional string description = 2;
  }
  message Where {
    string id = 1;
  }

  Where where = 1;
  optional Fields fields = 2;
}
message UpdateLearningPathResponse {
  LearningPath learningPath = 1;
}


message RemoveLearningPathRequest {
  message Where {
    string id = 1;
  }

  Where where = 1;
}
message RemoveLearningPathResponse {}