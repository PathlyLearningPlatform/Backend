syntax = "proto3";

package learning_paths.v1;

import "common/types.proto";

message Unit {
  string id = 1;
  string createdAt = 2;
  string updatedAt = 3;
  string name = 4;
  string description = 5;
  int32 order = 6;
  string sectionId = 7;
  int32 lessonCount = 8;
}

service UnitsService {
  rpc List(ListUnitsRequest) returns (ListUnitsResponse) {};
  rpc FindById(FindUnitByIdRequest) returns (FindUnitByIdResponse) {};
  rpc Create(CreateUnitRequest) returns (CreateUnitResponse) {};
  rpc Update(UpdateUnitRequest) returns (UpdateUnitResponse) {};
  rpc Reorder(ReorderUnitRequest) returns (ReorderUnitResponse) {};
  rpc Remove(RemoveUnitRequest) returns (RemoveUnitResponse) {};
}

message ListUnitsRequest {
  message Options {
    optional int32 limit = 1;
    optional int32 page = 2;
  }

  message Where {
    optional string sectionId = 1;
  }

  optional Options options = 1;
  optional Where where = 2;
}
message ListUnitsResponse {
  repeated Unit units = 1;
}

message FindUnitByIdRequest {
  message Where {
    string id = 1;
  }

  Where where = 1;
}
message FindUnitByIdResponse {
  Unit unit = 1;
}

message CreateUnitRequest {
  string name = 1;
  optional string description = 2;
  string sectionId = 3;
}
message CreateUnitResponse {
  Unit unit = 1;
}

message UpdateUnitRequest {
  message Fields {
    optional string name = 1;
    optional string description = 2;
  }
  message Where {
    string id = 1;
  }

  Where where = 1;
  optional Fields fields = 2;
}
message UpdateUnitResponse {
  Unit unit = 1;
}

message ReorderUnitRequest {
  string unitId = 1;
  int32 order = 2;
}
message ReorderUnitResponse {}

message RemoveUnitRequest {
  message Where {
    string id = 1;
  }

  Where where = 1;
}
message RemoveUnitResponse {}