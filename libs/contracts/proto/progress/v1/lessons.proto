syntax = "proto3";

package progress.v1;

service LessonProgressService {
  rpc List(ListLessonProgressRequest) returns (ListLessonProgressResponse) {};

  rpc FindForUser(FindLessonProgressForUserRequest) returns (FindLessonProgressForUserResponse) {};
  rpc FindById(FindLessonProgressByIdRequest) returns (FindLessonProgressByIdResponse) {};

  rpc Start(StartLessonRequest) returns (StartLessonResponse) {};

  rpc Remove(RemoveLessonProgressRequest) returns (RemoveLessonProgressResponse) {};
}

message LessonProgress {
  string id = 1;
  string lessonId = 2;
  string userId = 3;
  string completedAt = 4;
  int32 totalActivityCount = 5;
  int32 completedActivityCount = 6;
  string unitId = 7;
}

message ListLessonProgressRequest {
  message Options {
    optional int32 limit = 1;
    optional int32 page = 2;
  }
  message Where {
    optional string userId = 1;
    optional string unitId = 2;
  }

  optional Options options = 1;
  optional Where where = 2;
}
message ListLessonProgressResponse {
  repeated LessonProgress lessonProgress = 1;
}

message FindLessonProgressForUserRequest {
  string lessonId = 1;
  string userId = 2;
}
message FindLessonProgressForUserResponse {
  LessonProgress lessonProgress = 1;
}

message FindLessonProgressByIdRequest {
  string id = 1;
}
message FindLessonProgressByIdResponse {
  LessonProgress lessonProgress = 1;
}

message StartLessonRequest {
  string lessonId = 1;
  string userId = 2;
}
message StartLessonResponse {
  LessonProgress lessonProgress = 1;
}

message RemoveLessonProgressRequest {
  string id = 1;
}
message RemoveLessonProgressResponse {}