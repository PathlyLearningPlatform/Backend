syntax = "proto3";

package progress.v1;

service SectionProgressService {
  rpc List(ListSectionProgressRequest) returns (ListSectionProgressResponse) {};

  rpc FindForUser(FindSectionProgressForUserRequest) returns (FindSectionProgressForUserResponse) {};
  rpc FindById(FindSectionProgressByIdRequest) returns (FindSectionProgressByIdResponse) {};

  rpc Start(StartSectionRequest) returns (StartSectionResponse) {};

  rpc Remove(RemoveSectionProgressRequest) returns (RemoveSectionProgressResponse) {};
}

message SectionProgress {
  string id = 1;
  string sectionId = 2;
  string userId = 3;
  string completedAt = 4;
  int32 totalUnitCount = 5;
  int32 completedUnitCount = 6;
  string learningPathId = 7;
}

message ListSectionProgressRequest {
  message Options {
    optional int32 limit = 1;
    optional int32 page = 2;
  }
  message Where {
    optional string userId = 1;
    optional string learningPathId = 2;
  }

  optional Options options = 1;
  optional Where where = 2;
}
message ListSectionProgressResponse {
  repeated SectionProgress sectionProgress = 1;
}

message FindSectionProgressForUserRequest {
  string sectionId = 1;
  string userId = 2;
}
message FindSectionProgressForUserResponse {
  SectionProgress sectionProgress = 1;
}

message FindSectionProgressByIdRequest {
  string id = 1;
}
message FindSectionProgressByIdResponse {
  SectionProgress sectionProgress = 1;
}

message StartSectionRequest {
  string sectionId = 1;
  string userId = 2;
}
message StartSectionResponse {
  SectionProgress sectionProgress = 1;
}

message RemoveSectionProgressRequest {
  string id = 1;
}
message RemoveSectionProgressResponse {}