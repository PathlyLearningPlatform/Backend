syntax = "proto3";

package skills.v1;

enum SkillRelationshipType {
  SKILL_RELATIONSHIP_TYPE_UNSPECIFIED = 0;
  SKILL_RELATIONSHIP_TYPE_PART_OF = 1;
  SKILL_RELATIONSHIP_TYPE_NEXT_STEP_OF = 2;
}

message Skill {
  string id = 1;
  string name = 2;
  string slug = 3;
}

message SkillRelationship {
  string from_id = 1;
  string to_id = 2;
  SkillRelationshipType type = 3;
}

message SkillGraphView {
  repeated Skill nodes = 1;
  repeated SkillRelationship edges = 2;
}

service SkillsService {
  rpc Create(SkillsServiceCreateRequest) returns (SkillsServiceCreateResponse) {}
  rpc Update(SkillsServiceUpdateRequest) returns (SkillsServiceUpdateResponse) {}
  rpc Remove(SkillsServiceRemoveRequest) returns (SkillsServiceRemoveResponse) {}

  rpc FindById(SkillsServiceFindByIdRequest) returns (SkillsServiceFindByIdResponse) {}
  rpc FindBySlug(SkillsServiceFindBySlugRequest) returns (SkillsServiceFindBySlugResponse) {}

  rpc AddNextStep(SkillsServiceAddNextStepRequest) returns (SkillsServiceAddNextStepResponse) {}
  rpc ListNextSteps(SkillsServiceListNextStepsRequest) returns (SkillsServiceListNextStepsResponse) {}
  rpc ListPrerequisities(SkillsServiceListPrerequisitiesRequest) returns (SkillsServiceListPrerequisitiesResponse) {}

  rpc AddChild(SkillsServiceAddChildRequest) returns (SkillsServiceAddChildResponse) {}
  rpc ListChildren(SkillsServiceListChildrenRequest) returns (SkillsServiceListChildrenResponse) {}

  rpc GetPrerequisiteGraph(SkillsServiceGetPrerequisiteGraphRequest) returns (SkillsServiceGetPrerequisiteGraphResponse) {}
}

message SkillsServiceCreateRequest {
  string name = 1;
  optional string parent_id = 2;
}
message SkillsServiceCreateResponse {
  Skill skill = 1;
}

message SkillsServiceUpdateRequest {
  message Where {
    string id = 1;
  }

  message Fields {
    optional string name = 1;
  }

  Where where = 1;
  Fields fields = 2;
}
message SkillsServiceUpdateResponse {
  Skill skill = 1;
}

message SkillsServiceRemoveRequest {
  string id = 1;
}
message SkillsServiceRemoveResponse {}

message SkillsServiceAddNextStepRequest {
  string prerequisite_skill_id = 1;
  string target_skill_id = 2;
}
message SkillsServiceAddNextStepResponse {}

message SkillsServiceAddChildRequest {
  string parent_skill_id = 1;
  string child_skill_id = 2;
}
message SkillsServiceAddChildResponse {}

message SkillsServiceFindByIdRequest {
  string id = 1;
}
message SkillsServiceFindByIdResponse {
  Skill skill = 1;
}

message SkillsServiceFindBySlugRequest {
  string slug = 1;
}
message SkillsServiceFindBySlugResponse {
  Skill skill = 1;
}

message SkillsServiceListNextStepsRequest {
  string skill_id = 1;
}
message SkillsServiceListNextStepsResponse {
  repeated Skill skills = 1;
}

message SkillsServiceListPrerequisitiesRequest {
  string skill_id = 1;
}
message SkillsServiceListPrerequisitiesResponse {
  repeated Skill skills = 1;
}

message SkillsServiceListChildrenRequest {
  string skill_id = 1;
}
message SkillsServiceListChildrenResponse {
  repeated Skill skills = 1;
}

message SkillsServiceGetPrerequisiteGraphRequest {
  optional string parent_skill_id = 1;
}
message SkillsServiceGetPrerequisiteGraphResponse {
  SkillGraphView graph = 1;
}
