name: pathly-backend

include:
  - ./services/auth/compose.yaml
  - ./services/learning-paths/compose.yaml
  - ./services/progress/compose.yaml

services:
  reverse-proxy:
    build:
      context: ./services/reverse-proxy
      target: prod
    ports:
      - 4000:80
    depends_on:
      api-gateway:
        condition: service_healthy
      auth:
        restart: true
        condition: service_healthy
    restart: always
  api-gateway:
    build:
      context: .
      target: prod
      dockerfile: ./services/api-gateway/Dockerfile
    environment:
      - name=value
    healthcheck:
      test: node ./healthcheck.js
      timeout: 10s
      start_period: 15s
    depends_on:
      learning-paths:
        condition: service_healthy
      progress:
        condition: service_healthy